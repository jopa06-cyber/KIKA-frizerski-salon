<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rezervirajte termin — Style &amp; Smile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sorts+Mill+Goudy:ital@0;1&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background-color: #0a0a0a;
      color: var(--text-grey);
      font-family: 'Sorts Mill Goudy', Georgia, serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 64px 24px;
      /* Subtle radial grain on background */
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(201,169,110,0.04) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(201,169,110,0.03) 0%, transparent 55%);
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    /* ── Header ── */
    .booking-header {
      text-align: center;
      margin-bottom: 56px;
    }

    .booking-eyebrow {
      font-family: 'Montserrat', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: #c9a96e;
      display: block;
      margin-bottom: 22px;
    }

    .booking-title {
      font-family: 'Sorts Mill Goudy', Georgia, serif;
      font-size: clamp(30px, 5vw, 52px);
      font-style: italic;
      color: var(--cream);
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 18px;
    }

    .booking-subtext {
      font-family: 'Montserrat', sans-serif;
      font-size: 14px;
      font-weight: 400;
      color: var(--medium-grey);
      line-height: 1.75;
      max-width: 380px;
      margin: 0 auto;
    }

    .booking-divider {
      width: 44px;
      height: 1px;
      background: linear-gradient(to right, transparent, #c9a96e, transparent);
      margin: 26px auto 0;
    }

    /* ── Cards grid ── */
    .booking-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      width: 100%;
      max-width: 860px;
      margin-bottom: 56px;
    }

    /* ── Card ── */
    .booking-card {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 22px;
      padding: 52px 28px 44px;
      background: #141414;
      border-radius: 14px;
      border: 1px solid rgba(201, 169, 110, 0.18);
      text-decoration: none;
      color: var(--cream);
      touch-action: none;
      /* Spotlight vars */
      --base: 38;
      --spread: 20;
      --radius: 14;
      --border: 2;
      --size: 300;
      --border-size: calc(var(--border) * 1px);
      --spotlight-size: calc(var(--size) * 1px);
      --hue: calc(var(--base) + (var(--xp, 0) * var(--spread)));
      --border-spot-opacity: 1;
      --border-light-opacity: 0.5;
      transition: border-color 0.25s ease,
                  box-shadow 0.25s ease,
                  transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .booking-card:hover {
      border-color: rgba(201, 169, 110, 0.55);
      box-shadow: 0 0 28px rgba(201, 169, 110, 0.35), 0 0 64px rgba(201, 169, 110, 0.15);
      transform: translateY(-5px);
    }

    /* Spotlight border */
    .booking-card::before,
    .booking-card::after {
      pointer-events: none;
      content: "";
      position: absolute;
      inset: calc(var(--border-size) * -1);
      border: var(--border-size) solid transparent;
      border-radius: calc(var(--radius) * 1px + var(--border-size));
      mask: linear-gradient(transparent, transparent), linear-gradient(white, white);
      mask-clip: padding-box, border-box;
      mask-composite: intersect;
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
    }

    .booking-card::before {
      background-image: radial-gradient(
        calc(var(--spotlight-size) * 0.75) calc(var(--spotlight-size) * 0.75) at
        var(--cx, -9999px) var(--cy, -9999px),
        hsl(var(--hue) 100% 65% / var(--border-spot-opacity)),
        transparent 100%
      );
      filter: brightness(3);
    }

    .booking-card::after {
      background-image: radial-gradient(
        calc(var(--spotlight-size) * 0.5) calc(var(--spotlight-size) * 0.5) at
        var(--cx, -9999px) var(--cy, -9999px),
        hsl(0 0% 100% / var(--border-light-opacity)),
        transparent 100%
      );
    }

    /* ── Icon wrapper ── */
    .booking-card-icon {
      width: 48px;
      height: 48px;
      color: #c9a96e;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .booking-card-icon svg {
      width: 100%;
      height: 100%;
    }

    /* stroke-based icons (phone) */
    .booking-card-icon.icon-stroke svg {
      fill: none;
      stroke: currentColor;
      stroke-width: 1.6;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* fill-based icons (WhatsApp, Instagram) */
    .booking-card-icon.icon-fill svg {
      fill: #c9a96e;
      stroke: none;
    }

    /* ── Card text ── */
    .booking-card-text {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .booking-card-label {
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--cream);
      text-align: center;
    }

    .booking-card-sub {
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      font-weight: 400;
      color: var(--medium-grey);
      text-align: center;
    }

    /* ── Back link ── */
    .booking-back {
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--medium-grey);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 9px;
      opacity: 0.7;
      transition: opacity 0.25s ease, color 0.25s ease;
    }

    .booking-back:hover {
      opacity: 1;
      color: #c9a96e;
    }

    .booking-back svg {
      width: 14px;
      height: 14px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ── Mobile ── */
    @media (max-width: 680px) {
      .booking-cards {
        grid-template-columns: 1fr;
        max-width: 380px;
      }
      .booking-card {
        flex-direction: row;
        justify-content: flex-start;
        padding: 28px 32px;
        gap: 24px;
      }
      .booking-card-text { align-items: flex-start; }
      .booking-card-icon { width: 40px; height: 40px; flex-shrink: 0; }
      body { padding: 48px 20px; padding-top: 80px; }
      main { justify-content: flex-start; }
      .booking-header { margin-bottom: 44px; }
      .booking-cards { margin-bottom: 44px; }
    }
  </style>
</head>
<body>

    <h1 class="booking-title">Rezervirajte svoj termin</h1>

  <a href="index.html" class="booking-back">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <line x1="19" y1="12" x2="5" y2="12"/>
      <polyline points="12 19 5 12 12 5"/>

    Povratak na početnu

  </main>

  <script>
    document.querySelectorAll('.booking-card').forEach(function (card) {
      card.addEventListener('pointermove', function (e) {
        var rect = card.getBoundingClientRect();
        card.style.setProperty('--cx', (e.clientX - rect.left).toFixed(1) + 'px');
        card.style.setProperty('--cy', (e.clientY - rect.top).toFixed(1) + 'px');
        card.style.setProperty('--xp', ((e.clientX - rect.left) / rect.width).toFixed(3));
      });
      card.addEventListener('pointerleave', function () {
        card.style.setProperty('--cx', '-9999px');
        card.style.setProperty('--cy', '-9999px');
      });
    });
  </script>

</body>
</html>
